name: Create and Publish Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  noop-on-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: No-op on main
      run: echo "Release workflow intentionally skipped on main pushes."

  test-install:
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - uses: ./.github/actions/build-elroy

    - name: Test built package
      run: |
        # Clean all Python artifacts to avoid import conflicts
        find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
        find . -type d -name "*.egg-info" -exec rm -rf {} + 2>/dev/null || true
        find . -type f -name "*.pyc" -delete 2>/dev/null || true

        # Temporarily move source to avoid Python path shadowing
        mv elroy elroy_source_backup

        # Create fresh test venv and install package
        python3 -m venv /tmp/test_venv
        source /tmp/test_venv/bin/activate
        pip install $GITHUB_WORKSPACE/dist/elroy-*.whl

        # Verify installation
        python -c "import elroy; print('Package installed successfully')"

        # Run CLI tests from /tmp to ensure no source conflicts
        cd /tmp
        bash $GITHUB_WORKSPACE/scripts/test_cli.sh

        # Restore source
        cd $GITHUB_WORKSPACE
        mv elroy_source_backup elroy
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: release
    needs: [test-install]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - uses: ./.github/actions/build-elroy

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        pip install --user uv
        source .venv/bin/activate
        uv pip install twine
        twine upload dist/*

  create-github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: release
    needs: [test-install]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Create GitHub Release
      uses: actions/create-release@v1
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
        body_path: CHANGELOG.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-stable-and-deploy-branch:
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: release
    needs: [publish-pypi, create-github-release]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Update stable branch
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git checkout stable || git checkout -b stable
        git reset --hard ${GITHUB_REF}
        git push -f origin stable
        git checkout deploy || git checkout -b deploy
        git reset --hard ${GITHUB_REF}
        git push -f origin deploy
